<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2f6fed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="家庭助手" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/m/manifest.webmanifest" />
    <link rel="icon" href="/m/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/m/icons/icon-192.png" />
    <title>家庭助手</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem('theme-storage');
          if (stored) {
            const { state } = JSON.parse(stored);
            if (state && state.mode === 'dark') {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (error) {
          document.documentElement.classList.remove('dark');
          console.error('Failed to initialize theme:', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/mobile/main.tsx"></script>
  </body>
</html>
