<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestJS Starter Pro</title>

    <!--
      防闪烁脚本（必须在所有内容加载前执行）
      作用：
      1. 立即从LocalStorage读取用户的主题偏好
      2. 如果用户选择了深色模式，立即添加.dark类到<html>
      3. 如果是首次访问，检测系统主题偏好并自动适配
      这样可以避免页面加载时的主题闪烁（FOUC）
    -->
    <script>
      (function() {
        try {
          // 尝试从LocalStorage读取用户的主题偏好
          const stored = localStorage.getItem('theme-storage');

          if (stored) {
            // 用户之前选择过主题
            const { state } = JSON.parse(stored);
            if (state && state.mode === 'dark') {
              document.documentElement.classList.add('dark');
            } else {
              // ✅ 修复：浅色模式时显式移除dark类（防止残留）
              document.documentElement.classList.remove('dark');
            }
          } else {
            // 首次访问，检测系统主题偏好
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            } else {
              // ✅ 修复：浅色模式时显式移除dark类
              document.documentElement.classList.remove('dark');
            }
          }
        } catch (error) {
          // 出错时静默失败，使用浅色模式作为默认值
          document.documentElement.classList.remove('dark');
          console.error('Failed to initialize theme:', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
