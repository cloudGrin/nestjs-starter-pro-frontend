<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清除主题缓存</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 0.5rem;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
    button.secondary {
      background: #6c757d;
    }
    button.secondary:hover {
      background: #5a6268;
    }
    .log {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      text-align: left;
      font-family: monospace;
      font-size: 12px;
      color: #495057;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 主题缓存清除工具</h1>
    <p>如果深色模式显示异常，可以尝试清除缓存并重新初始化主题设置。</p>

    <div>
      <button onclick="clearTheme()">清除主题缓存</button>
      <button class="secondary" onclick="goBack()">返回登录</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    function log(message) {
      const logEl = document.getElementById('log');
      logEl.innerHTML += message + '<br>';
    }

    function clearTheme() {
      log('开始清除主题缓存...');

      // 1. 清除 theme-storage
      log('清除 localStorage.theme-storage');
      localStorage.removeItem('theme-storage');

      // 2. 清除 HTML class
      log('清除 <html> 的 dark 类');
      document.documentElement.classList.remove('dark');

      // 3. 检测系统主题
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      log('检测到系统主题: ' + (isDark ? '深色' : '浅色'));

      // 4. 初始化为系统主题
      if (isDark) {
        log('设置为深色模式');
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme-storage', JSON.stringify({
          state: { mode: 'dark' },
          version: 0
        }));
      } else {
        log('设置为浅色模式');
        localStorage.setItem('theme-storage', JSON.stringify({
          state: { mode: 'light' },
          version: 0
        }));
      }

      log('✅ 清除完成！3秒后自动跳转...');
      setTimeout(() => {
        window.location.href = '/';
      }, 3000);
    }

    function goBack() {
      window.location.href = '/';
    }

    // 显示当前状态
    window.onload = function() {
      log('=== 当前状态 ===');
      log('LocalStorage: ' + localStorage.getItem('theme-storage'));
      log('HTML class: ' + document.documentElement.className);
      log('系统主题: ' + (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    };
  </script>
</body>
</html>
